<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>크레용팡</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jua',sans-serif;background:#050510;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#game-root{display:flex;gap:12px;justify-content:center;padding:16px;align-items:flex-start;background:#0a0a1a;border-radius:16px}
#left-panel,#right-panel{display:flex;flex-direction:column;gap:6px;width:90px}
.panel-box{background:rgba(20,10,60,0.88);border:1px solid rgba(255,200,50,0.35);border-radius:10px;padding:8px;text-align:center}
.panel-label{font-size:11px;color:#aaa;margin-bottom:3px}
.panel-val{font-size:18px;color:#fff}
.ctrl-hint{font-size:11px;color:#666;line-height:2}
#next-canvas{width:76px;height:76px;border-radius:4px}
#board-wrap{position:relative}
canvas#board{border:2px solid rgba(255,255,255,0.15);border-radius:8px;display:block}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;gap:12px;z-index:10}
#overlay-title{font-size:38px;color:#fff;text-shadow:0 0 20px rgba(255,200,50,1)}
#overlay-sub{font-size:14px;color:#aaa}
#start-btn{padding:10px 28px;background:#e85d04;color:#fff;border:none;border-radius:24px;font-size:16px;cursor:pointer;font-family:'Jua',sans-serif}
#start-btn:hover{background:#c44d00}
#chain-flash{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:#FFE050;pointer-events:none;opacity:0;transition:opacity .2s;z-index:5;text-shadow:0 0 12px #FA8;white-space:nowrap;text-align:center;line-height:1.3}
#mobile-ctrl{display:none;width:100%;gap:8px;justify-content:center;padding:4px 0}
#mobile-ctrl button{flex:1;max-width:70px;height:52px;font-size:22px;border-radius:12px;border:2px solid rgba(255,200,50,0.4);background:rgba(20,10,60,0.85);color:#fff;cursor:pointer;font-family:'Jua',sans-serif}
#bgm-btn{width:100%;padding:6px;border:1px solid rgba(255,200,50,0.4);border-radius:8px;background:rgba(20,10,60,0.8);color:#FFD050;cursor:pointer;font-family:'Jua',sans-serif;font-size:12px}
#lb-btn{width:100%;padding:6px;border:1px solid rgba(255,200,50,0.4);border-radius:8px;background:rgba(20,10,60,0.8);color:#FFD050;cursor:pointer;font-family:'Jua',sans-serif;font-size:12px;margin-top:0}
#lb-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
#lb-box{background:#0d0620;border:1px solid rgba(255,200,50,0.4);border-radius:16px;padding:20px;width:320px;max-height:80vh;overflow-y:auto}
#lb-box h2{font-size:20px;color:#FFD050;margin-bottom:12px;text-align:center}
.lb-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,0.08);font-size:13px;color:#fff}
.lb-rank{width:28px;text-align:center;color:#FFD050;font-size:15px}
.lb-name{flex:1;color:#fff}
.lb-score{color:#FAC775;font-size:15px}
.lb-stage{font-size:11px;color:#888;margin-left:4px}
#lb-close{width:100%;padding:8px;margin-top:12px;background:#e85d04;color:#fff;border:none;border-radius:8px;font-family:'Jua',sans-serif;font-size:14px;cursor:pointer}
#name-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
#name-box{background:#0d0620;border:1px solid rgba(255,200,50,0.4);border-radius:16px;padding:24px;width:280px;text-align:center}
#name-box h2{font-size:20px;color:#FFD050;margin-bottom:8px}
#name-box p{font-size:13px;color:#aaa;margin-bottom:16px}
#name-input{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,200,50,0.4);background:rgba(20,10,60,0.8);color:#fff;font-family:'Jua',sans-serif;font-size:15px;text-align:center;margin-bottom:12px}
#name-submit{width:100%;padding:9px;background:#e85d04;color:#fff;border:none;border-radius:8px;font-family:'Jua',sans-serif;font-size:15px;cursor:pointer}
#name-skip{width:100%;padding:7px;background:transparent;color:#888;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-family:'Jua',sans-serif;font-size:13px;cursor:pointer;margin-top:6px}
@media(max-width:600px){
  body{align-items:flex-start;padding:0}
  #game-root{flex-direction:column;align-items:center;padding:10px;width:100vw;border-radius:0;min-height:100vh}
  #left-panel,#right-panel{flex-direction:row;width:100%}
  .panel-box{flex:1;padding:6px 4px}
  .panel-val{font-size:14px}
  canvas#board{width:100% !important;max-width:360px;display:block;margin:0 auto}
  .ctrl-hint{display:none}
  #mobile-ctrl{display:flex !important}
}
</style>
</head>
<body>
<div id="game-root">
  <div id="left-panel">
    <div class="panel-box"><div class="panel-label">점수</div><div class="panel-val" id="score">0</div></div>
    <div class="panel-box"><div class="panel-label">최고</div><div class="panel-val" id="best" style="color:#FFD050">0</div></div>
    <div class="panel-box"><div class="panel-label">연쇄</div><div class="panel-val" id="chain" style="color:#FAC775">0</div></div>
    <div class="panel-box"><div class="panel-label">다음</div><canvas id="next-canvas" width="76" height="76"></canvas></div>
  </div>
  <div id="board-wrap">
    <canvas id="board" width="288" height="576"></canvas>
    <div id="chain-flash"></div>
    <div id="overlay">
      <div id="overlay-title">크레용팡</div>
      <div id="overlay-sub">4개 이상 연결하면 팡!</div>
      <button id="start-btn" onclick="startGame()">게임 시작</button>
    </div>
  </div>
  <div id="right-panel">
    <div class="panel-box">
      <div class="panel-label" style="color:#FFD050">CRAYON PANG</div>
      <div class="panel-val" id="stage-badge" style="color:#FAC775;font-size:15px;margin-top:4px">ST.1</div>
    </div>
    <div class="panel-box"><div class="panel-label">레벨</div><div class="panel-val" id="level">1</div></div>
    <div class="panel-box"><div class="panel-label">조작</div><div class="ctrl-hint">← → 이동<br>↑ 회전<br>↓ 내리기<br>Space 즉시</div></div>
    <div class="panel-box"><button id="bgm-btn" onclick="toggleBGM()">🎵 BGM</button></div>
    <div class="panel-box"><button id="lb-btn" onclick="showLeaderboard()">🏆 순위표</button></div>
  </div>
  <div id="mobile-ctrl">
    <button onclick="move(-1)">◀</button>
    <button onclick="rotate()">↻</button>
    <button onclick="hardDrop()" style="border-color:rgba(255,100,0,0.5)">▼▼</button>
    <button onclick="move(1)">▶</button>
  </div>
</div>

<!-- 순위표 모달 -->
<div id="lb-modal">
  <div id="lb-box">
    <h2>🏆 순위표</h2>
    <div id="lb-list"><div style="text-align:center;color:#888;padding:20px">불러오는 중...</div></div>
    <button id="lb-close" onclick="document.getElementById('lb-modal').style.display='none'">닫기</button>
  </div>
</div>

<!-- 닉네임 모달 -->
<div id="name-modal">
  <div id="name-box">
    <h2>게임 오버!</h2>
    <p id="name-score-text">점수를 등록할까요?</p>
    <input id="name-input" type="text" placeholder="닉네임 입력" maxlength="10">
    <button id="name-submit" onclick="submitScore()">등록하기</button>
    <button id="name-skip" onclick="document.getElementById('name-modal').style.display='none'">그냥 닫기</button>
  </div>
</div>

<script>

const API='https://script.google.com/macros/s/AKfycbyqclOcPzwcFvM3r1K3Yzi6Rh1pR5VO6ZGJMVbctHEnWcS-neaUD8E1veGhPUhjnZI/exec';

async function showLeaderboard(myName, myRank){
  document.getElementById('lb-modal').style.display='flex';
  document.getElementById('lb-list').innerHTML='<div style="text-align:center;color:#888;padding:20px">불러오는 중...</div>';
  try{
    const r=await fetch(API+'?action=get');
    const data=await r.json();
    if(!data.length){
      document.getElementById('lb-list').innerHTML='<div style="text-align:center;color:#888;padding:20px">아직 기록이 없어요!</div>';
      return;
    }
    const medals=['🥇','🥈','🥉'];
    const rankText = myRank ? `<div style="text-align:center;color:#FFD050;font-size:16px;margin-bottom:12px;padding:8px;border:1px solid rgba(255,200,50,0.3);border-radius:8px">🎉 ${myName}님 ${myRank}위 등록!</div>` : '';
    document.getElementById('lb-list').innerHTML=rankText+data.map((d,i)=>{
      const isMe = myName && d.name===myName;
      return `<div class="lb-row" style="${isMe?'background:rgba(255,200,50,0.12);border-radius:6px;padding:6px 4px;':''}">
        <span class="lb-rank">${medals[i]||i+1}</span>
        <span class="lb-name" style="${isMe?'color:#FFD050;font-weight:bold;':''}">${d.name}${isMe?' ◀':''}</span>
        <span class="lb-score">${d.score.toLocaleString()}</span>
        <span class="lb-stage">ST.${d.stage}</span>
      </div>`;
    }).join('');
  }catch(e){
    document.getElementById('lb-list').innerHTML='<div style="text-align:center;color:#E24B4A;padding:20px">서버 연결 실패</div>';
  }
}

function showNameModal(){
  document.getElementById('name-score-text').textContent='점수 '+score.toLocaleString()+'점을 등록할까요?';
  document.getElementById('name-input').value=localStorage.getItem('crayonpang_name')||'';
  document.getElementById('name-modal').style.display='flex';
  setTimeout(()=>document.getElementById('name-input').focus(),100);
}

async function submitScore(){
  const name=document.getElementById('name-input').value.trim();
  if(!name){document.getElementById('name-input').focus();return;}
  localStorage.setItem('crayonpang_name',name);
  document.getElementById('name-modal').style.display='none';
  try{
    const url=API+'?action=post&name='+encodeURIComponent(name)+'&score='+score+'&stage='+stage;
    await fetch(url,{method:'GET',mode:'no-cors'});
    // no-cors라 응답 못 받으니 잠깐 기다렸다가 순위표 표시
    setTimeout(()=>showLeaderboard(name, null),1500);
  }catch(e){
    showLeaderboard();
  }
}

let grid,current,next,score,level,chainCount,gameRunning,dropTimer,dropInterval;
let particles=[],wobbles={},stage=1;

// ===== 맵 정의 =====
// validCells[r][c] = true 이면 사용 가능한 셀
function buildMap(s){
  const map=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  if(s===1){
    // ST1: 직사각형 전체
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) map[r][c]=true;
  } else if(s===2){
    // ST2: 다이아몬드형 - 위아래로 좁아지는 마름모
    for(let r=0;r<ROWS;r++){
      const mid=ROWS/2;
      const half=Math.round((r<mid ? (r+1)*(COLS/2)/mid : (ROWS-r)*(COLS/2)/mid));
      const start=Math.floor(COLS/2)-half;
      const end=Math.ceil(COLS/2)+half;
      for(let c=Math.max(0,start);c<Math.min(COLS,end);c++) map[r][c]=true;
    }
  } else if(s===3){
    // ST3: 역삼각형 - 위가 넓고 아래가 좁음
    for(let r=0;r<ROWS;r++){
      const w=Math.max(1,Math.ceil(COLS*(1-r/(ROWS-1)*0.8)));
      const start=Math.floor((COLS-w)/2);
      for(let c=start;c<start+w;c++) if(c>=0&&c<COLS) map[r][c]=true;
    }
  } else {
    // ST4: 계단형 - 오른쪽으로 내려가는 계단
    for(let r=0;r<ROWS;r++){
      const step=Math.floor(r/3); // 3줄마다 한 칸씩 오른쪽
      const start=Math.min(step,COLS-3);
      for(let c=start;c<COLS;c++) map[r][c]=true;
    }
  }
  return map;
}

let validMap=buildMap(1);

function isValid(r,c){
  return r>=0&&r<ROWS&&c>=0&&c<COLS&&validMap[r][c];
}

// ===== AUDIO =====
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new AudioCtx();return audioCtx;}
function beep(freq,dur,type='sine',vol=0.15,delay=0){
  try{
    const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();
    o.type=type;o.connect(g);g.connect(ac.destination);
    const t=ac.currentTime+delay;
    o.frequency.value=freq;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur);
  }catch(e){}
}
function playMove(){beep(320,0.04,'sine',0.07);}
function playRotate(){beep(500,0.06,'sine',0.1);beep(700,0.04,'sine',0.08,0,0.03);}
function playLand(){beep(180,0.08,'sine',0.12);}
function playPop(n){for(let i=0;i<Math.min(n,6);i++)setTimeout(()=>beep(400+Math.random()*400,0.12,'sine',0.2),i*25);}
function playChain(n){[523,659,784,1047,1319,1568].slice(0,Math.min(n,6)).forEach((f,i)=>setTimeout(()=>beep(f,0.18,'triangle',0.2),i*110));}
function playBig(){[600,800,1000].forEach((f,i)=>setTimeout(()=>beep(f,0.15,'triangle',0.25),i*80));}
function playSuper(){[400,600,800,1000,1200,1500].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'square',0.28),i*60));}
function playLevelUp(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'triangle',0.22),i*90));}
function playStageClear(){[523,659,784,1047,1319,1568].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'triangle',0.25),i*100));}
function playCountdown(){beep(880,0.1,'square',0.18);}
function playVictory(){[523,523,523,415,523,659,523].forEach((f,i)=>setTimeout(()=>beep(f,0.15,'square',0.2),i*120));}
function playGameOver(){[400,350,300,250,200].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'sawtooth',0.18),i*140));}

const STAGE_BGM={
  1:{
    notes:[523,523,659,523,784,740,523,523,659,523,880,784],
    dur:0.22, type:'triangle', vol:0.05, name:'ST.1'
  },
  2:{
    notes:[659,784,880,784,659,587,659,784,880,1047,880,784],
    dur:0.18, type:'triangle', vol:0.055, name:'ST.2'
  },
  3:{
    notes:[440,494,523,494,440,415,440,494,523,587,523,494],
    dur:0.16, type:'square', vol:0.04, name:'ST.3'
  },
  4:{
    notes:[784,880,988,880,784,698,784,880,988,1047,988,880,784,698,659,698],
    dur:0.13, type:'sawtooth', vol:0.035, name:'ST.4'
  }
};

function startBGM(){
  if(bgmPlaying)return;
  bgmPlaying=true;
  const bgm=STAGE_BGM[stage]||STAGE_BGM[1];
  function loop(){
    if(!bgmPlaying)return;
    try{
      const ac=getAC();let t=ac.currentTime+0.05;
      bgm.notes.forEach((f,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type=bgm.type;o.connect(g);g.connect(ac.destination);
        o.frequency.value=f;
        g.gain.setValueAtTime(0,t+i*bgm.dur);
        g.gain.linearRampToValueAtTime(bgm.vol,t+i*bgm.dur+0.02);
        g.gain.linearRampToValueAtTime(bgm.vol*0.8,t+i*bgm.dur+bgm.dur-0.02);
        g.gain.linearRampToValueAtTime(0,t+i*bgm.dur+bgm.dur);
        o.start(t+i*bgm.dur);o.stop(t+i*bgm.dur+bgm.dur);
      });
      bgmTimer=setTimeout(loop,(bgm.notes.length*bgm.dur-0.05)*1000);
    }catch(e){}
  }
  loop();
}
function stopBGM(){bgmPlaying=false;if(bgmTimer)clearTimeout(bgmTimer);}
function toggleBGM(){
  const btn=document.getElementById('bgm-btn');
  if(bgmPlaying){stopBGM();btn.textContent='🔇 BGM OFF';}
  else{startBGM();btn.textContent='🎵 BGM ON';}
}

// ===== GAME =====
function newGrid(){return Array.from({length:ROWS},()=>Array(COLS).fill(0));}

function makePuyo(){
  const colorCount = stage>=4?6:stage>=3?5:stage>=2?4:3;
  const rc=()=>Math.floor(Math.random()*colorCount);
  // 유효한 열 찾기 (맵 중앙 근처)
  const validCols=[];
  for(let c=0;c<COLS;c++) if(isValid(0,c)) validCols.push(c);
  if(validCols.length<2) return {puyos:[{r:0,c:validCols[0]||0,color:rc()},{r:1,c:validCols[0]||0,color:rc()}]};
  const mid=validCols[Math.floor(validCols.length/2)];
  const c2=validCols.includes(mid+1)?mid+1:validCols[Math.floor(validCols.length/2)-1];
  return {puyos:[{r:0,c:mid,color:rc()},{r:0,c:c2,color:rc()}]};
}

function startGame(){
  stage=1; validMap=buildMap(1);
  grid=newGrid();score=0;level=1;chainCount=0;particles=[];wobbles={};
  document.getElementById('score').textContent=0;
  document.getElementById('level').textContent=1;
  document.getElementById('chain').textContent=0;
  document.getElementById('best').textContent=bestScore;
  document.getElementById('stage-badge').textContent='ST.1';
  document.getElementById('overlay').style.display='none';
  if(window.innerWidth<=600)document.getElementById('mobile-ctrl').style.display='flex';
  next=makePuyo();spawn();
  gameRunning=true;
  startBGM();document.getElementById('bgm-btn').textContent='🎵 BGM ON';
  dropInterval=800;clearInterval(dropTimer);
  dropTimer=setInterval(()=>{if(gameRunning)drop();},dropInterval);
}

function spawn(){current=next;next=makePuyo();drawNext();if(!canPlace(current))gameOver();}

function canPlace(p){return p.puyos.every(({r,c})=>isValid(r,c)&&!grid[r][c]);}
function canMove(p,dr,dc){
  return p.puyos.every(({r,c})=>{
    const nr=r+dr,nc=c+dc;
    return isValid(nr,nc)&&(!grid[nr][nc]||p.puyos.some(q=>q.r===nr&&q.c===nc));
  });
}

function drop(){
  if(!current)return;
  if(canMove(current,1,0))current.puyos.forEach(p=>p.r++);
  else lock();
  draw();
}

function lock(){
  current.puyos.forEach(({r,c,color})=>{if(r>=0&&isValid(r,c))grid[r][c]=color+1;});
  current=null;applyGravity();chainCount=0;playLand();checkChain();
}

function applyGravity(){
  for(let c=0;c<COLS;c++){
    let b=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){
      if(!isValid(r,c))continue;
      if(grid[r][c]){
        // 찾은 셀 아래로 이동
        while(b>r&&(!isValid(b,c)||grid[b][c]))b--;
        if(b!==r&&isValid(b,c)){grid[b][c]=grid[r][c];grid[r][c]=0;}
        b--;
      }
    }
  }
}

function flood(r,c,color){
  const visited=new Set(),queue=[[r,c]],result=[];
  while(queue.length){
    const[cr,cc]=queue.pop(),key=cr*COLS+cc;
    if(visited.has(key)||!isValid(cr,cc)||grid[cr][cc]!==color)continue;
    visited.add(key);result.push([cr,cc]);
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>queue.push([cr+dr,cc+dc]));
  }
  return result;
}

function checkChain(){
  const toRemove=new Set();
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c]&&isValid(r,c)){
    const g=flood(r,c,grid[r][c]);if(g.length>=4)g.forEach(([gr,gc])=>toRemove.add(gr*COLS+gc));
  }
  if(toRemove.size>0){
    chainCount++;
    document.getElementById('chain').textContent=chainCount;
    showChainText(chainCount);
    playPop(toRemove.size);playChain(chainCount);
    const cnt=toRemove.size;
    let sizeMult=1,sizeTag='';
    if(cnt>=8){sizeMult=3;sizeTag='SUPER!!';playSuper();}
    else if(cnt>=5){sizeMult=1.5;sizeTag='BIG!';playBig();}
    const gained=Math.floor(cnt*10*chainCount*chainCount*sizeMult);
    score+=gained;
    if(sizeTag)showBonusText(sizeTag,cnt>=8?'#FF4040':'#80FF80');
    updateScore();
    toRemove.forEach(key=>{const r=Math.floor(key/COLS),c=key%COLS;addWobble(r*COLS+c);});
    spawnParticles(toRemove);
    toRemove.forEach(key=>{grid[Math.floor(key/COLS)][key%COLS]=0;});
    applyGravity();draw();startParticleLoop();
    window._chainTimeout=setTimeout(checkChain,350);
  }else{
    chainCount=0;document.getElementById('chain').textContent=0;spawn();draw();
  }
}

function updateScore(){
  document.getElementById('score').textContent=score;
  level=Math.floor(score/300)+1;
  document.getElementById('level').textContent=level;
  dropInterval=Math.max(150,800-level*50);
  const newStage=score>=3000?4:score>=2000?3:score>=1000?2:1;
  if(newStage>stage){
    stage=newStage;
    document.getElementById('stage-badge').textContent='ST.'+stage;
    triggerStageUp();
  }
}

function triggerStageUp(){
  gameRunning=false;clearInterval(dropTimer);clearTimeout(window._chainTimeout);
  playStageClear();
  const fl=document.getElementById('chain-flash');
  const stageNames=['','직사각형','다이아몬드','역삼각형','계단'];
  const steps=[
    [0,'ST.'+stage+' '+stageNames[stage]+'!','#FFE050','36px'],
    [1200,'3','#FFE050','52px'],
    [1900,'2','#FFE050','52px'],
    [2600,'1','#FFE050','52px'],
    [3300,'GO!','#80FF80','52px'],
    [4000,'','','32px'],
  ];
  steps.forEach(([delay,txt,color,size])=>{
    setTimeout(()=>{
      fl.style.fontSize=size;fl.style.color=color;
      fl.textContent=txt;fl.style.opacity=txt?1:0;
      if(txt==='3'||txt==='2'||txt==='1')playCountdown();
      if(txt==='GO!')playVictory();
      if(txt===''){
        // 맵 전환!
        validMap=buildMap(stage);
        grid=newGrid();
        gameRunning=true;
        dropInterval=Math.max(150,800-level*50);
        dropTimer=setInterval(()=>{if(gameRunning)drop();},dropInterval);
        // BGM 스테이지별로 재시작
        stopBGM();
        setTimeout(()=>{startBGM();document.getElementById('bgm-btn').textContent='🎵 BGM ON';},200);
        next=makePuyo();spawn();draw();
      }
    },delay);
  });
}

function showChainText(n){
  if(n<2)return;
  const fl=document.getElementById('chain-flash');
  setTimeout(()=>{
    fl.style.fontSize=n>=5?'48px':n>=4?'44px':n>=3?'40px':'34px';
    fl.style.color=n>=5?'#FF2020':n>=4?'#FF4040':n>=3?'#FF8040':'#FFE050';
    fl.textContent=n>=5?n+'연쇄 🔥🔥':n+'연쇄!!';
    fl.style.opacity=1;
    clearTimeout(fl._timer);
    fl._timer=setTimeout(()=>fl.style.opacity=0,900);
  },400);
}
function showBonusText(msg,color){
  const fl=document.getElementById('chain-flash');
  fl.style.fontSize='42px';fl.style.color=color||'#80FF80';
  fl.textContent=msg;fl.style.opacity=1;
  clearTimeout(fl._timer2);
  fl._timer2=setTimeout(()=>fl.style.opacity=0,900);
}

function gameOver(){
  gameRunning=false;clearInterval(dropTimer);stopBGM();playGameOver();
  if(score>bestScore){bestScore=score;localStorage.setItem('crayonpang_best',score);}
  document.getElementById('overlay').style.display='flex';
  document.getElementById('overlay-title').textContent='게임 오버';
  document.getElementById('overlay-sub').textContent='점수: '+score+(score>=bestScore&&score>0?' 🏆 최고기록!':'');
  document.getElementById('start-btn').textContent='다시 시작';
  setTimeout(showNameModal,800);
}

function rotate(){
  if(!current||current.puyos.length!==2)return;
  const[a,b]=current.puyos,dr=a.r-b.r,dc=a.c-b.c;
  const test={puyos:[{r:b.r-dc,c:b.c+dr,color:a.color},{r:b.r,c:b.c,color:b.color}]};
  if(canPlace(test)){current=test;playRotate();draw();}
}
function move(dc){if(!current||!canMove(current,0,dc))return;current.puyos.forEach(p=>p.c+=dc);playMove();draw();}
function hardDrop(){if(!current)return;while(canMove(current,1,0))current.puyos.forEach(p=>p.r++);draw();lock();}

function spawnParticles(keys){
  keys.forEach(key=>{
    const r=Math.floor(key/COLS),c=key%COLS,ci=grid[r][c];if(!ci)return;
    const cx=c*CELL+CELL/2,cy=r*CELL+CELL/2;
    for(let i=0;i<14;i++){
      const angle=Math.random()*Math.PI*2,speed=Math.random()*3+1.5;
      particles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
        size:Math.random()*7+3,life:1,decay:Math.random()*0.06+0.04,
        color:COLORS[ci-1],rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.3});
    }
  });
}
let animFrame=null;
function startParticleLoop(){
  if(animFrame)return;
  function loop(){
    if(particles.length>0){draw();drawParticles();updateParticles();animFrame=requestAnimationFrame(loop);}
    else animFrame=null;
  }
  animFrame=requestAnimationFrame(loop);
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.vx*=0.95;p.life-=p.decay;p.rot+=p.rotSpeed;});
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=Math.max(0,p.life);
    ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.moveTo(0,-p.size);ctx.lineTo(p.size*0.4,-p.size*0.4);ctx.lineTo(p.size,0);
    ctx.lineTo(p.size*0.4,p.size*0.4);ctx.lineTo(0,p.size);ctx.lineTo(-p.size*0.4,p.size*0.4);
    ctx.lineTo(-p.size,0);ctx.lineTo(-p.size*0.4,-p.size*0.4);ctx.closePath();ctx.fill();
    ctx.restore();
  });
}

function addWobble(key){wobbles[key]={t:0,amp:0.18};}
function updateWobbles(){
  Object.keys(wobbles).forEach(k=>{
    wobbles[k].t+=0.28;
    if(wobbles[k].t>Math.PI*2)delete wobbles[k];
  });
}

function drawChar(context,x,y,colorIdx,alpha,size,wKey){
  if(!colorIdx||colorIdx>_gi.length)return;
  const s=size||CELL,img=_gi[colorIdx-1];
  context.save();context.globalAlpha=alpha||1;
  if(wKey!==undefined&&wobbles[wKey]){
    const w=wobbles[wKey],cx=x+s/2,cy=y+s/2;
    context.translate(cx,cy);
    context.rotate(Math.sin(w.t)*w.amp);
    context.scale(1+Math.sin(w.t*2)*0.08,1-Math.sin(w.t*2)*0.05);
    context.translate(-cx,-cy);
  }
  if(img&&img.complete&&img.naturalWidth>0){
    context.globalCompositeOperation='screen';
    context.drawImage(img,x+1,y+1,s-2,s-2);
  }else{
    context.globalCompositeOperation='source-over';
    context.fillStyle=COLORS[colorIdx-1];
    context.beginPath();context.arc(x+s/2,y+s/2,s/2-3,0,Math.PI*2);context.fill();
  }
  context.restore();
}

function drawBridge(r,c,nr,nc,colorIdx){
  const img=_gi[colorIdx-1];
  const ax=c*CELL+CELL/2,ay=r*CELL+CELL/2,bx=nc*CELL+CELL/2,by=nr*CELL+CELL/2;
  for(let s=1;s<=5;s++){
    const t=s/6,ix=ax+(bx-ax)*t,iy=ay+(by-ay)*t,sz=CELL*0.48*(1-Math.abs(t-0.5)*0.6);
    ctx.globalAlpha=0.38*(1-Math.abs(t-0.5));
    if(img&&img.complete){ctx.save();ctx.globalCompositeOperation='screen';ctx.drawImage(img,ix-sz/2,iy-sz/2,sz,sz);ctx.restore();}
  }
  ctx.globalAlpha=1;
}

function draw(){
  ctx.fillStyle='rgba(5,5,20,0.93)';ctx.fillRect(0,0,COLS*CELL,ROWS*CELL);

  // 맵 유효 셀 배경
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(validMap[r][c]){
      ctx.fillStyle='rgba(255,255,255,0.03)';
      ctx.fillRect(c*CELL+1,r*CELL+1,CELL-2,CELL-2);
    } else {
      ctx.fillStyle='rgba(0,0,0,0.72)';
      ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
    }
  }

  // 맵 경계선 노란색으로 표시
  ctx.strokeStyle='rgba(255,210,50,0.55)';
  ctx.lineWidth=2;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(!validMap[r][c]) continue;
    // 위쪽 경계
    if(r===0||!validMap[r-1][c]){
      ctx.beginPath();ctx.moveTo(c*CELL,r*CELL);ctx.lineTo((c+1)*CELL,r*CELL);ctx.stroke();
    }
    // 아래쪽 경계
    if(r===ROWS-1||!validMap[r+1][c]){
      ctx.beginPath();ctx.moveTo(c*CELL,(r+1)*CELL);ctx.lineTo((c+1)*CELL,(r+1)*CELL);ctx.stroke();
    }
    // 왼쪽 경계
    if(c===0||!validMap[r][c-1]){
      ctx.beginPath();ctx.moveTo(c*CELL,r*CELL);ctx.lineTo(c*CELL,(r+1)*CELL);ctx.stroke();
    }
    // 오른쪽 경계
    if(c===COLS-1||!validMap[r][c+1]){
      ctx.beginPath();ctx.moveTo((c+1)*CELL,r*CELL);ctx.lineTo((c+1)*CELL,(r+1)*CELL);ctx.stroke();
    }
  }

  // 그리드 선
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(COLS*CELL,r*CELL);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,ROWS*CELL);ctx.stroke();}

  updateWobbles();

  // 연결 브릿지
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const ci=grid[r][c];if(!ci)continue;
    [[0,1],[1,0]].forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;
      if(nr<ROWS&&nc<COLS&&grid[nr][nc]===ci)drawBridge(r,c,nr,nc,ci);
    });
  }

  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
    if(grid[r][c])drawChar(ctx,c*CELL,r*CELL,grid[r][c],1,undefined,r*COLS+c);

  if(current){
    const ghost=JSON.parse(JSON.stringify(current));
    while(canMove(ghost,1,0))ghost.puyos.forEach(p=>p.r++);
    ghost.puyos.forEach(({r,c,color})=>drawChar(ctx,c*CELL,r*CELL,color+1,0.2));
    if(current.puyos.length===2){
      const[a,b]=current.puyos;
      if(a.color===b.color)drawBridge(a.r,a.c,b.r,b.c,a.color+1);
    }
    current.puyos.forEach(({r,c,color})=>drawChar(ctx,c*CELL,r*CELL,color+1));
  }
}

function drawNext(){
  nctx.fillStyle='rgba(5,5,20,0.9)';nctx.fillRect(0,0,76,76);
  if(!next)return;
  next.puyos.slice(0,2).forEach(({color},i)=>drawChar(nctx,i*38+1,4,color+1,1,34));
}

document.getElementById('name-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') submitScore();
});
document.addEventListener('keydown',e=>{
  if(!gameRunning||!current)return;
  if(e.key==='ArrowLeft'){e.preventDefault();move(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();move(1);}
  if(e.key==='ArrowUp'){e.preventDefault();rotate();}
  if(e.key==='ArrowDown'){e.preventDefault();drop();}
  if(e.key===' '){e.preventDefault();hardDrop();}
});

let touchStartX=0,touchStartY=0,touchStartTime=0;
board.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;touchStartTime=Date.now();e.preventDefault();},{passive:false});
board.addEventListener('touchend',e=>{
  if(!gameRunning||!current)return;
  const dx=e.changedTouches[0].clientX-touchStartX,dy=e.changedTouches[0].clientY-touchStartY,dt=Date.now()-touchStartTime;
  if(dt<200&&Math.abs(dx)<15&&Math.abs(dy)<15){rotate();return;}
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20){dx>0?move(1):move(-1);}
  else if(Math.abs(dy)>20){dy>0?hardDrop():rotate();}
  e.preventDefault();
},{passive:false});

draw();
</script>
